version: '3.8'

services:
  steven-academy:
    build: .
    ports:
      - "8080:80"           # Acceder en http://localhost:8080
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_NAME=steven_academy
      - DB_USER=root
      - DB_PASSWORD=StevenAcademy2026
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - ./:/var/www/html     # Para desarrollo (hot reload)

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: StevenAcademy2026
      MYSQL_DATABASE: steven_academy
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: